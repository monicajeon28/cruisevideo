# 가격 티어 (T1/T2/T3)
price_tiers:
  T1_진입가:
    name: 진입
    range: [1000000, 1500000]
    anchor_text: 만원부터
    positioning: 도파민형
    description: 알래스카 내측 기준, 가격 충격으로 관심 유도
    content_type: PRICE_SHOCK

  T2_주력가:
    name: 주력
    range: [1500000, 2500000]
    anchor_text: 만원대
    positioning: 교육형
    description: 지중해 주력가, 기준 제시 후 가치 설득
    content_type: VALUE_EDUCATION

  T3_프리미엄:
    name: 프리미엄
    range: [2500000, 5000000]
    anchor_text: 만원대
    positioning: 신뢰형
    description: 지중해 프리미엄, 가격 분해 절대 금지
    content_type: TRUST_PREMIUM
    rules:
      - 가격 분해 금지
      - 월 XX만원 표현 금지
      - 경험 총가치 강조

