# 생성 전략
generation_strategy:
  daily_target: 100
  s_grade_pass_rate: 0.90
  retry_max: 3
  premium_tier_ratio: 0.20
  max_scripts_per_port: 4
  max_scripts_per_category: 5
  duplicate_prevention_days: 7
  parallel_workers: 4

# Content Type 별 Hook 타입
content_type_hooks:
  T1_진입가:
    - PRICE_SHOCK
    - FOMO_URGENCY
    - COMPARISON_GAP

  T2_주력가:
    - VALUE_EDUCATION
    - CRITERIA_STANDARD
    - EXPERT_AUTHORITY

  T3_프리미엄:
    - TRUST_PREMIUM
    - EXPERIENCE_TOTAL
    - EMOTION_STORY

# CTA 3단계 템플릿
cta_templates:
  urgency: "프로필 링크 확인하세요"
  action: "카카오톡에서 크루즈닷 검색"
  trust: "11년 경력 + 2억 보험 + 24시간 케어"
