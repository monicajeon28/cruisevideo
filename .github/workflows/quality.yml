# GitHub Actions CI - Code Quality
# 코드 품질 검사 (린팅, 타입 체크, 포매팅)

name: Code Quality

on:
  push:
    branches: [main, master, develop]
    paths:
      - '**.py'
      - 'pyproject.toml'
      - '.github/workflows/quality.yml'
  pull_request:
    branches: [main, master, develop]
    paths:
      - '**.py'
      - 'pyproject.toml'
      - '.github/workflows/quality.yml'

jobs:
  lint:
    name: Lint with Ruff
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff

      - name: Run Ruff linter
        run: |
          ruff check . --output-format=github

      - name: Run Ruff formatter check
        run: |
          ruff format --check .

  type-check:
    name: Type Check with mypy
    runs-on: ubuntu-latest
    continue-on-error: true  # mypy 오류가 있어도 빌드 실패하지 않음 (선택적)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Run mypy
        run: |
          mypy . --ignore-missing-imports --no-error-summary || true

  security:
    name: Security Check with Bandit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Bandit
        run: pip install bandit[toml]

      - name: Run Bandit security scan
        run: |
          bandit -r . -x ./venv,./backend/venv,./.pytest_cache -f json -o bandit-report.json || true
          bandit -r . -x ./venv,./backend/venv,./.pytest_cache -f txt

      - name: Upload Bandit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: bandit-security-report
          path: bandit-report.json
          retention-days: 30

  quality-badge:
    name: Generate Quality Badge
    runs-on: ubuntu-latest
    needs: [lint, type-check, security]
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Create quality badge
        uses: schneegans/dynamic-badges-action@v1.7.0
        with:
          auth: ${{ secrets.GIST_SECRET }}
          gistID: ${{ vars.QUALITY_BADGE_GIST_ID }}
          filename: quality-badge.json
          label: Code Quality
          message: passing
          color: brightgreen
          namedLogo: python
